name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 04:30 UTC - catches anything that bypassed pre-commit / PR checks.
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks against full history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  trufflehog:
    name: TruffleHog (working tree + history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (verified secrets only on PRs, all on main/schedule)
        uses: trufflesecurity/trufflehog@v3.91.2
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --results=verified,unknown --exclude-paths=.trufflehog-exclude.txt

  detect-secrets:
    name: detect-secrets vs baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Audit baseline (no new secrets vs .secrets.baseline)
        run: |
          detect-secrets scan --baseline .secrets.baseline \
            --exclude-files '\.git/' \
            --exclude-files '\.gitleaks\.toml$'
          # If detect-secrets found new secrets, the baseline file would be modified.
          if ! git diff --quiet .secrets.baseline; then
            echo "::error::New secrets detected vs .secrets.baseline. Audit them:"
            echo "  detect-secrets audit .secrets.baseline"
            git --no-pager diff .secrets.baseline
            exit 1
          fi
